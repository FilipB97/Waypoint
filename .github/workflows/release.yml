name: Release

# Trzy sposoby wydania:
#  • JEDNYM KLIKNIĘCIEM (zalecane): Actions → Release → "Run workflow" → wybierz typ podbicia
#    (patch / minor / major) i kliknij. Wersja liczona jest automatycznie z ostatniego taga —
#    nie trzeba nic wpisywać ani sprawdzać, jaka wersja jest teraz.
#  • z ręczną wersją: w tym samym oknie wpisz dokładną wersję w polu "version" (ma pierwszeństwo).
#  • przez push taga: git tag v1.2.3 && git push origin v1.2.3
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Co podbić (gdy pole 'version' puste)"
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
      version:
        description: "Wersja bez 'v' (opcjonalnie — nadpisuje 'bump', np. 2.0.0)"
        type: string
        required: false
        default: ""
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # pełna historia + tagi — do policzenia następnej wersji i listy zmian od poprzedniego wydania

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      # Wersja liczona jest z ostatniego taga (git), więc nie trzeba jej znać ani wpisywać.
      # Wartości do env (nie inline ${{ }} w skrypcie) — chroni przed script injection.
      - name: Determine version
        id: ver
        shell: bash
        env:
          EVENT: ${{ github.event_name }}
          BUMP: ${{ github.event.inputs.bump }}
          EXACT: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          # Najwyższy istniejący tag vX.Y.Z (pomija np. v1.2.3-rc1). Brak tagów → punkt startu 0.0.0.
          LATEST_TAG="$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)"
          LATEST="${LATEST_TAG#v}"
          [ -z "$LATEST" ] && LATEST="0.0.0"

          if [ "$EVENT" = "push" ]; then
            # Wyzwolone push-em taga — użyj wersji z taga.
            V="${REF_NAME#v}"
          elif [ -n "${EXACT// /}" ]; then
            # Ręcznie podana dokładna wersja ma pierwszeństwo nad 'bump'.
            V="${EXACT#v}"
          else
            # Policz następną wersję z najnowszego taga wg wybranego typu.
            IFS='.' read -r MA MI PA <<< "$LATEST"
            MA=$((10#$MA)); MI=$((10#$MI)); PA=$((10#$PA))   # 10# → wymuś dziesiętnie (bez pułapki ósemkowej)
            case "$BUMP" in
              major) MA=$((MA+1)); MI=0; PA=0 ;;
              minor) MI=$((MI+1)); PA=0 ;;
              patch) PA=$((PA+1)) ;;
              *) echo "::error::Nieznany typ podbicia: '$BUMP'"; exit 1 ;;
            esac
            V="$MA.$MI.$PA"
          fi

          # Walidacja formatu semver X.Y.Z.
          if ! printf '%s' "$V" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Nieprawidłowa wersja: '$V' (oczekiwano X.Y.Z)"; exit 1
          fi

          # Nie nadpisuj istniejącego wydania — złap kolizję zanim cokolwiek zbudujemy.
          if git rev-parse -q --verify "refs/tags/v$V" >/dev/null; then
            echo "::error::Tag v$V już istnieje — wybierz inny typ podbicia lub podaj wersję ręcznie."; exit 1
          fi

          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V"    >> "$GITHUB_OUTPUT"

          # Podsumowanie widoczne na stronie uruchomienia (Actions → run → Summary).
          {
            echo "### Release v$V"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Poprzednia wersja | ${LATEST_TAG:-— (brak tagów)} |"
            echo "| Nowa wersja | **v$V** |"
            echo "| Wyzwolenie | ${EVENT} |"
            if [ "$EVENT" = "workflow_dispatch" ] && [ -z "${EXACT// /}" ]; then
              echo "| Typ podbicia | ${BUMP} |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Test
        run: dotnet test RdpManager.sln -c Release

      - name: Publish (self-contained single-file x64)
        shell: pwsh
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          dotnet publish src/RdpManager/RdpManager.csproj -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true -p:DebugType=none -p:DebugSymbols=false `
            -p:Version=$env:VERSION -o publish
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item publish/Waypoint.exe "dist/Waypoint-$env:VERSION-win-x64.exe"

      # Podpisujemy tylko, gdy sekret PFX jest ustawiony — bez niego build i tak wydaje
      # (niepodpisany) plik, więc wydania działają zanim skonfigurujesz certyfikat.
      - name: Detect signing secret
        id: signing
        shell: bash
        env:
          PFX_B64: ${{ secrets.SIGNING_PFX_BASE64 }}
        run: |
          if [ -n "$PFX_B64" ]; then echo "enabled=true" >> "$GITHUB_OUTPUT"; else echo "enabled=false" >> "$GITHUB_OUTPUT"; fi

      - name: Sign (Authenticode)
        if: steps.signing.outputs.enabled == 'true'
        shell: pwsh
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          PFX_B64: ${{ secrets.SIGNING_PFX_BASE64 }}
          PFX_PWD: ${{ secrets.SIGNING_PFX_PASSWORD }}
        run: |
          $exe = "dist/Waypoint-$env:VERSION-win-x64.exe"
          $pfx = Join-Path $env:RUNNER_TEMP "sign.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:PFX_B64))
          try {
            $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
                        Where-Object { $_.FullName -like "*\x64\*" } |
                        Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty FullName
            if (-not $signtool) { throw "signtool.exe not found in the Windows SDK" }
            # RFC-3161 znacznik czasu — podpis pozostaje ważny po wygaśnięciu certyfikatu.
            & $signtool sign /f $pfx /p $env:PFX_PWD /fd SHA256 `
              /tr http://timestamp.digicert.com /td SHA256 $exe
            if ($LASTEXITCODE -ne 0) { throw "signtool sign failed ($LASTEXITCODE)" }
            # Potwierdź, że plik faktycznie ma podpis (bez /pa — self-signed nie łączy się z zaufanym rootem).
            $sig = Get-AuthenticodeSignature $exe
            Write-Host "Signature status: $($sig.Status); signer: $($sig.SignerCertificate.Subject)"
            if ($sig.SignerCertificate -eq $null) { throw "file is not signed after signtool run" }
          }
          finally {
            Remove-Item $pfx -Force -ErrorAction SilentlyContinue
          }

      - name: Release notes
        shell: pwsh
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          TAG: ${{ steps.ver.outputs.tag }}
          SIGNED: ${{ steps.signing.outputs.enabled }}
        run: |
          $exe  = "dist/Waypoint-$env:VERSION-win-x64.exe"
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash

          # Realne zmiany = commity od POPRZEDNIEGO wydania do HEAD, bez merge-commitów (czyli same
          # commity z gałęzi PR-ów). Poprzedni tag = najwyższy wg wersji, który NIE jest bieżącym
          # (bieżący istnieje tylko przy wyzwoleniu przez push taga; przy workflow_dispatch jeszcze nie).
          $tags = @(git tag --sort=-v:refname)
          $prev = ($tags | Where-Object { $_ -and $_ -ne $env:TAG } | Select-Object -First 1)
          $changes = @()
          if ($prev) { $changes = @(git log "$prev..HEAD" --no-merges --pretty=format:"- %s") | Where-Object { $_ } }

          $sw = [IO.StreamWriter]::new("notes.md", $false, [Text.UTF8Encoding]::new($false))
          $sw.WriteLine("## What's changed")
          $sw.WriteLine("")
          if ($changes.Count -gt 0) {
            foreach ($c in $changes) { $sw.WriteLine($c) }
            if ($prev) { $sw.WriteLine(""); $sw.WriteLine("_Since $prev._") }
          } else {
            $sw.WriteLine("- See the commit history for details.")
          }
          $sw.WriteLine("")
          $sw.WriteLine("---")
          $sw.WriteLine("")
          $sw.WriteLine("**Waypoint** - a modern RDP manager for Windows (WPF, Fluent / Mica).")
          $sw.WriteLine("")
          $sw.WriteLine("Download the ``Waypoint-...-win-x64.exe`` asset below and run it - self-contained,")
          $sw.WriteLine("no .NET install required (Windows 10/11 x64).")
          $sw.WriteLine("")
          if ($env:SIGNED -eq "true") {
            $sw.WriteLine("This build is Authenticode-signed. The certificate is self-signed, so SmartScreen")
            $sw.WriteLine("may still warn on first run (*More info -> Run anyway*); in-app auto-update verifies")
            $sw.WriteLine("that each update is signed by the same publisher as your installed copy.")
          } else {
            $sw.WriteLine("> Not code-signed, so SmartScreen may warn on first run: *More info -> Run anyway*.")
          }
          $sw.WriteLine("")
          $sw.WriteLine("**SHA-256** ``$hash``")
          $sw.Close()

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
          VERSION: ${{ steps.ver.outputs.version }}
          SHA: ${{ github.sha }}
        run: |
          gh release create "$TAG" "dist/Waypoint-$VERSION-win-x64.exe" \
            --title "Waypoint $VERSION" \
            --target "$SHA" \
            --notes-file notes.md
