name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish (self-contained x64)
        run: >
          dotnet publish src/RdpManager/RdpManager.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      # Nazwa taga przez env (nie inline ${{ }} w skrypcie) — chroni przed injection w pwsh.
      - name: Package
        shell: pwsh
        env:
          TAG: ${{ github.ref_name }}
        run: Compress-Archive -Path publish/* -DestinationPath "RdpManager-$env:TAG-win-x64.zip"

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$env:TAG" "RdpManager-$env:TAG-win-x64.zip" --title "$env:TAG" --generate-notes
