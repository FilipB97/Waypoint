name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Nowszy push na tę samą gałąź anuluje trwający build — mniej marnowanych minut.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    # WPF + the RDP ActiveX interop require Windows.
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Cache pakietów NuGet (klucz po hashu plików .csproj) — szybszy restore.
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore RdpManager.sln

      - name: Build
        run: dotnet build RdpManager.sln -c Release --no-restore

      - name: Test
        run: dotnet test RdpManager.sln -c Release --no-build --verbosity normal
